    <line x1="500" y1="270" x2="580" y2="200"/>
    <line x1="500" y1="270" x2="550" y2="350"/>
    <!-- cluster 4 -->
    <line x1="560" y1="60"  x2="680" y2="110"/>
    <line x1="580" y1="200" x2="680" y2="110"/>
    <line x1="580" y1="200" x2="700" y2="260"/>
    <line x1="550" y1="350" x2="700" y2="260"/>
    <line x1="550" y1="350" x2="660" y2="370"/>
