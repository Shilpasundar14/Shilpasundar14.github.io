    <line x1="820" y1="200" x2="920" y2="110"/>
    <line x1="820" y1="200" x2="950" y2="260"/>
    <line x1="800" y1="340" x2="950" y2="260"/>
    <line x1="920" y1="110" x2="1010" y2="70"/>
    <line x1="920" y1="110" x2="1040" y2="210"/>
    <line x1="950" y1="260" x2="1040" y2="210"/>
    <line x1="950" y1="260" x2="1020" y2="360"/>
    <line x1="1010" y1="70"  x2="1080" y2="130"/>
    <line x1="1040" y1="210" x2="1080" y2="130"/>
    <line x1="1040" y1="210" x2="1090" y2="290"/>
    <line x1="1020" y1="360" x2="1090" y2="290"/>
