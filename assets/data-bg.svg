    <circle cx="680" cy="110" r="11"/>
    <circle cx="700" cy="260" r="8"/>
    <circle cx="660" cy="370" r="7"/>
    <circle cx="790" cy="70"  r="8"/>
    <circle cx="820" cy="200" r="10"/>
    <circle cx="800" cy="340" r="8"/>
    <circle cx="920" cy="110" r="11"/>
    <circle cx="950" cy="260" r="8"/>
    <circle cx="1010" cy="70" r="7"/>
    <circle cx="1040" cy="210" r="10"/>
    <circle cx="1020" cy="360" r="8"/>
    <circle cx="1080" cy="130" r="8"/>
    <circle cx="1090" cy="290" r="7"/>
