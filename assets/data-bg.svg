    <line x1="480" y1="120" x2="680" y2="110"/>
    <line x1="680" y1="110" x2="920" y2="110"/>
    <line x1="380" y1="190" x2="580" y2="200"/>
    <line x1="580" y1="200" x2="820" y2="200"/>
    <line x1="820" y1="200" x2="1040" y2="210"/>
