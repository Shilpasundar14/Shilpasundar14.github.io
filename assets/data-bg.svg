    <line x1="60"  y1="120" x2="130" y2="220"/>
    <line x1="60"  y1="120" x2="70"  y2="320"/>
    <line x1="140" y1="60"  x2="240" y2="100"/>
    <line x1="130" y1="220" x2="240" y2="100"/>
    <line x1="130" y1="220" x2="270" y2="230"/>
    <line x1="70"  y1="320" x2="130" y2="220"/>
    <line x1="70"  y1="320" x2="210" y2="360"/>
    <!-- cluster 2 -->
    <line x1="240" y1="100" x2="360" y2="60"/>
    <line x1="240" y1="100" x2="270" y2="230"/>
    <line x1="270" y1="230" x2="360" y2="60"/>
